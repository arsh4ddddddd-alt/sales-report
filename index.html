<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Global Sales System - High Speed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: white; --text: #333; --border: #ccc; }
        .dark-mode { --bg: #18191a; --card: #242526; --text: #e4e6eb; --border: #3e4042; }

        body { font-family: -apple-system, sans-serif; padding: 10px; background: var(--bg); color: var(--text); padding-bottom: 80px; transition: 0.3s; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #1a73e8; margin-top: 5px; text-transform: uppercase; font-size: 20px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .dark-toggle { width: auto; padding: 5px 10px; font-size: 12px; background: #333; color: white; margin-top: 0; }

        .shop-box { border: 2px solid #1a73e8; padding: 12px; border-radius: 8px; margin-bottom: 20px; background: var(--card); position: relative; }
        .item-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr auto; gap: 5px; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; align-items: end; }
        
        .search-inner { background: #fffde7; padding: 5px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #fbc02d; font-size: 11px; width: 100%; box-sizing: border-box; color: #333; }
        label { font-weight: bold; font-size: 10px; color: #666; display: block; margin-bottom: 2px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing: border-box; background: var(--card); color: var(--text); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .add-shop { background: #333; color: white; }
        .load-all { background: #e67e22; color: white; margin-bottom: 10px; }
        .add-item { background: #e8f0fe; color: #1a73e8; border: 1px dashed #1a73e8; }
        .pdf-btn { background: #28a745; color: white; font-size: 18px; margin-top: 20px; }
        .del-btn { background: #ffeded; color: #d93025; width: 35px; padding: 5px; font-size: 16px; border: 1px solid #f5c6cb; }
        .shop-del { position: absolute; top: -10px; right: 10px; background: #d93025; color: white; width: auto; padding: 4px 10px; font-size: 11px; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #888; border-top: 1px solid var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="top-bar">
        <span>Dynapharm System</span>
        <button class="dark-toggle" onclick="toggleDarkMode()">🌓 DARK MODE</button>
    </div>

    <h2>Rapport des Ventes</h2>
    <div style="text-align: center; margin-bottom: 15px;">
        <label>Date du Rapport</label>
        <input type="date" id="reportDate" onchange="saveAll()">
    </div>

    <div id="shopsContainer"></div>

    <button class="add-shop" onclick="addShop()">+ ADD NEW SHOP</button>
    <button class="pdf-btn" onclick="generatePDF()">DOWNLOAD PDF REPORT</button>

    <div class="footer">
        Developed by: <b>[ARSHAD]</b> | WhatsApp: <b>[+243902702275]</b>
    </div>
</div>

<script>
    const products = [
        {code: "DRC1201", name: "CAFE GINKO EN POUDRE ET GINSENG EN POUDR", price: 13.00},
        {code: "DRC1202", name: "CAFÉ DE THE VERT AVEC POUDRE GANODERMA", price: 14.00},
        {code: "DRC1203", name: "CAFÉ KACIP FATIMA AVEC POUDRE GANODERMA", price: 14.00},
        {code: "DRC1204", name: "CAFE AVEC LA POUDRE DE TONGKAT ET MACCA", price: 14.00},
        {code: "DRC1205", name: "CAFÉ CUPPUCCINO AVEC LA POUDRE GANODERMA", price: 15.00},
        {code: "DRC1802A", name: "D.I. LIQUID ALFALFA PLUS GUARANA 500ML", price: 20.00},
        {code: "DRC1804", name: "GANODERMA CAFE (20x21g)", price: 11.00},
        {code: "DRC1810", name: "CAPUSLE DE YEE GANO 90s", price: 23.00},
        {code: "DRC1811", name: "YEEGARLIC CAPSULE 90's", price: 23.00},
        {code: "DRC1814", name: "GANODERMA CHOCOLAT (30'sX 30's)", price: 19.00},
        {code: "DRC1817", name: "CAFÉ CHOIX DU PRESIDENT 4 EN 1", price: 15.00},
        {code: "DRC1818", name: "CAFÉ NOIR GANODERMA ET TONGKATI ALI", price: 14.00},
        {code: "DRC2802", name: "COMPRIMES DE LAIT DE CHEVRE 150's", price: 16.00},
        {code: "DRC2804", name: "POUDRE INSTANTANEE DES GAINES DE SOJA", price: 17.00},
        {code: "DRC2805", name: "MARINE SOLUBLE SPIRULLINA", price: 17.00},
        {code: "DRC2807", name: "COMPRIME DE SPIRULINA (300's)", price: 22.00},
        {code: "DRC2812", name: "HERBA WARISAN MAHARANI", price: 36.00},
        {code: "DRC2813", name: "MELANGE INSTANTANE DE SOJA GINGEMBRE", price: 14.00},
        {code: "DRC2814", name: "LAIT DE CHEVRE EN 1 ET POUDRE (PREMIX)", price: 15.00},
        {code: "DRC3804", name: "DYNA TONIC 780ml", price: 33.00},
        {code: "DRC3809", name: "YEE YANG YEN TABLET 90's", price: 23.00},
        {code: "DRC3810", name: "RED COFFEE WITH GINSENG 12's x 25g", price: 13.00},
        {code: "DRC3812", name: "GREEN TEA EXTRACT CAPSULE 60's", price: 23.00},
        {code: "DRC3814", name: "PROLINK 20's x 20g", price: 36.00},
        {code: "DRC4803", name: "GINSENG MIEL ET GINGEMBRE", price: 17.00},
        {code: "DRC4805", name: "GINSENG CAPSULE 9 x 10's", price: 31.00},
        {code: "DRC4810", name: "CAFÉ TONGKAT ALI (20x21g)", price: 11.00},
        {code: "DRC4811", name: "GINALI CAPSULE 100's", price: 27.00},
        {code: "DRC4815", name: "YEEGINKGO TABLET 90's", price: 23.00},
        {code: "DRC4817", name: "MILK THISTLE TABLET 120's", price: 36.00},
        {code: "DRC4821", name: "TONGKAT ALI CAPSULE 100's", price: 21.00},
        {code: "DRC4824", name: "SEA CUCUMBER JELLY 500ml", price: 31.00},
        {code: "DRC5802N", name: "NONI 500ml", price: 26.00},
        {code: "DRC5803", name: "NONI PLUS TEA 30's x 3g", price: 19.00},
        {code: "DRC5806", name: "DYNA 'S' TABLET 120's", price: 21.00},
        {code: "DRC9918", name: "DYNA SERENOA TABLET 100's", price: 32.00}
    ];

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    function addShop(data = null) {
        const container = document.getElementById('shopsContainer');
        const div = document.createElement('div');
        div.className = 'shop-box';
        div.innerHTML = `
            <button class="shop-del" onclick="this.parentElement.remove(); saveAll();">REMOVE SHOP</button>
            <input type="text" class="shopName" placeholder="SHOP NAME" style="font-weight:bold; width:80%;" oninput="saveAll()">
            <div class="items-list"></div>
            <button class="load-all" onclick="loadAllProducts(this)">⚡ LOAD ALL PRODUCTS</button>
            <button class="add-item" onclick="addItem(this)">+ ADD ONE PRODUCT</button>
        `;
        container.appendChild(div);
        if (data) {
            div.querySelector('.shopName').value = data.name;
            data.items.forEach(item => addItem(div.querySelector('.add-item'), item));
        }
    }

    function loadAllProducts(btn) {
        const list = btn.parentElement.querySelector('.items-list');
        list.innerHTML = ""; // Clear existing
        products.forEach(p => {
            addItem(btn, { val: `${p.price}|${p.code}|${p.name}`, sold: 0, stock: 0 });
        });
        saveAll();
    }

    function addItem(btn, data = null) {
        const list = btn.parentElement.querySelector('.items-list');
        const row = document.createElement('div');
        row.className = 'item-row';
        let opts = products.map(p => `<option value="${p.price}|${p.code}|${p.name}">${p.code} - ${p.name}</option>`).join('');
        row.innerHTML = `
            <div>
                <label>🔍 Code</label>
                <input type="text" class="search-inner" placeholder="ex: 1201" oninput="filterLocalSelect(this)">
                <select class="pData" onchange="updateRowPrice(this); saveAll();">${opts}</select>
            </div>
            <div><label>Prix($)</label><input type="number" class="pPrice" readonly></div>
            <div><label>Vendu</label><input type="number" class="pSold" value="0" onfocus="this.select()" oninput="saveAll()" onkeydown="handleEnter(event, 'sold')"></div>
            <div><label>Reste</label><input type="number" class="pStock" value="0" onfocus="this.select()" oninput="saveAll()" onkeydown="handleEnter(event, 'stock')"></div>
            <button class="del-btn" onclick="this.parentElement.remove(); saveAll();">×</button>
        `;
        list.appendChild(row);
        const sel = row.querySelector('.pData');
        if (data) {
            sel.value = data.val;
            row.querySelector('.pSold').value = data.sold;
            row.querySelector('.pStock').value = data.stock;
        }
        updateRowPrice(sel);
    }

    function updateRowPrice(sel) {
        sel.parentElement.parentElement.querySelector('.pPrice').value = sel.value.split('|')[0];
    }

    function handleEnter(e, type) {
        if (e.key === "Enter") {
            e.preventDefault();
            const row = e.target.closest('.item-row');
            if (type === 'sold') {
                row.querySelector('.pStock').focus();
            } else {
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                    nextRow.querySelector('.pSold').focus();
                } else {
                    const nextShop = row.closest('.shop-box').nextElementSibling;
                    if (nextShop) {
                        const firstInput = nextShop.querySelector('.pSold');
                        if (firstInput) firstInput.focus();
                    }
                }
            }
        }
    }

    function filterLocalSelect(input) {
        const val = input.value.toUpperCase();
        const select = input.nextElementSibling;
        Array.from(select.options).forEach(opt => {
            opt.style.display = opt.text.toUpperCase().includes(val) ? "" : "none";
            if (val !== "" && opt.text.toUpperCase().includes(val)) select.value = opt.value;
        });
        updateRowPrice(select);
        saveAll();
    }

    function saveAll() {
        const shops = [];
        document.querySelectorAll('.shop-box').forEach(box => {
            const items = [];
            box.querySelectorAll('.item-row').forEach(row => {
                items.push({
                    val: row.querySelector('.pData').value,
                    sold: row.querySelector('.pSold').value,
                    stock: row.querySelector('.pStock').value
                });
            });
            shops.push({ name: box.querySelector('.shopName').value, items });
        });
        localStorage.setItem('dynapharmData', JSON.stringify({
            date: document.getElementById('reportDate').value,
            shops: shops
        }));
    }

    window.onload = () => {
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        const saved = JSON.parse(localStorage.getItem('dynapharmData'));
        if (saved) {
            document.getElementById('reportDate').value = saved.date;
            saved.shops.forEach(s => addShop(s));
        } else {
            addShop();
        }
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const date = document.getElementById('reportDate').value;
        doc.setFontSize(16); doc.setTextColor(230, 126, 34);
        doc.text("RAPPORT GLOBAL DES VENTES & INVENTAIRE", 105, 15, { align: "center" });
        doc.setFontSize(10); doc.setTextColor(0);
        doc.text("Date ciblée: " + date, 14, 25);
        doc.setFont("helvetica", "italic");
        doc.text("Ce document récapitule les ventes de toutes les boutiques pour la journée indiquée.", 14, 30);

        let grandTotal = 0;
        let summaries = [];
        let details = [];

        document.querySelectorAll('.shop-box').forEach(box => {
            const name = (box.querySelector('.shopName').value || "SHOP").toUpperCase();
            let shopTotal = 0;
            let rows = [];
            box.querySelectorAll('.item-row').forEach(row => {
                const [price, code, pName] = row.querySelector('.pData').value.split('|');
                const sold = parseInt(row.querySelector('.pSold').value) || 0;
                const totalLine = parseFloat(price) * sold;
                shopTotal += totalLine;
                rows.push([code, pName, "$" + parseFloat(price).toFixed(2), sold, row.querySelector('.pStock').value, {content: "$" + totalLine.toFixed(2), styles: {fontStyle: 'bold'}}]);
            });
            grandTotal += shopTotal;
            summaries.push([name, {content: "$" + shopTotal.toFixed(2), styles: {fontStyle: 'bold'}}]);
            details.push({name, total: shopTotal, rows});
        });

        doc.autoTable({
            startY: 40, head: [['Boutique', 'Total des Ventes ($)']],
            body: [...summaries, [{content: 'TOTAL GÉNÉRAL DU JOUR', styles: {fontStyle: 'bold'}}, {content: "$" + grandTotal.toFixed(2), styles: {fontStyle: 'bold'}}]],
            headStyles: { fillColor: [230, 126, 34] }
        });

        let currentY = doc.lastAutoTable.finalY + 15;
        details.forEach(shop => {
            if (currentY > 240) { doc.addPage(); currentY = 20; }
            doc.setFontSize(12); doc.setTextColor(231, 76, 60); doc.setFont("helvetica", "bold");
            doc.text(`DÉTAIL: ${shop.name} (Ventes = $${shop.total.toFixed(2)})`, 14, currentY);
            doc.autoTable({
                startY: currentY + 4,
                head: [['Code', 'Désignation', 'Prix Unit.', 'Vendu', 'Reste (Stock)', 'Total $']],
                body: shop.rows,
                headStyles: { fillColor: [231, 76, 60] },
                styles: { fontSize: 8 },
                columnStyles: { 5: { fontStyle: 'bold' } }
            });
            currentY = doc.lastAutoTable.finalY + 15;
        });
        doc.save(`Global_Report_${date}.pdf`);
    }
</script>
</body>
</html>
