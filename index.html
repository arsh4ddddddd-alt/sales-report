<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DYNAPHARM SALES REPORT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQoBJhPYyYfvPSWsWse3OgfMxNmd24iXQ",
            authDomain: "business-arshad.firebaseapp.com",
            projectId: "business-arshad",
            storageBucket: "business-arshad.firebasestorage.app",
            messagingSenderId: "1097198781152",
            appId: "1:1097198781152:web:67f22b2dc944c93b240685"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Making the save function available to the button
        window.submitReport = async () => {
            const shop = document.getElementById('shopName').value;
            const amount = document.getElementById('salesAmount').value;

            if (!shop || !amount) {
                alert("Please fill in both fields!");
                return;
            }

            try {
                await addDoc(collection(db, "daily_sales"), {
                    shop: shop,
                    amount: amount,
                    timestamp: new Date(),
                    developer: "ARSHAD"
                });
                alert("DONE: Sales Report Sent to Cloud!");
                location.reload();
            } catch (error) {
                alert("Error: " + error.message);
            }
        };
    </script>

    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background-color: #0046ad; color: white; width: 100%; padding: 30px 0; text-align: center; border-bottom: 5px solid #ffd700; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { background: white; width: 90%; max-width: 400px; margin-top: 30px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #0046ad; margin-top: 0; font-size: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background-color: #0046ad; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); background-color: #003585; }
        .footer { margin-top: 40px; text-align: center; color: #777; font-size: 13px; }
        .dev-link { color: #0046ad; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 24px; letter-spacing: 1px;">DYNAPHARM</h1>
    <p style="margin:5px 0 0; opacity: 0.9;">SALES REPORT SYSTEM</p>
</div>

<div class="container">
    <h2>Enter Daily Totals</h2>
    
    <label>Shop Location / Name</label>
    <input type="text" id="shopName" placeholder="e.g. Kinshasa Shop 1">
    
    <label>Total Sales Amount ($)</label>
    <input type="number" id="salesAmount" placeholder="0.00">
    
    <button class="btn" onclick="submitReport()">SUBMIT REPORT</button>
</div>

<div class="footer">
    DEVELOPED BY:<br>
    <a href="tel:+243902702275" class="dev-link">ARSHAD: +243 902 702 275</a>
    <p>© 2026 DYNAPHARM DRC</p>
</div>

</body>
</html>
