<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Sales - ARSHAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --blue: #1a73e8; --green: #28a745; --dark: #202124; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 10px; color: var(--dark); -webkit-font-smoothing: antialiased; }
        
        /* Layout Containers */
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .shop-box { border: 1px solid #ddd; border-left: 6px solid var(--blue); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; background: #fff; }
        
        /* Mobile Friendly Inputs */
        .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; align-items: flex-end; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .row > div { flex: 1; min-width: 70px; }
        .row > div:first-child { flex: 3; min-width: 150px; } /* Product dropdown gets more space */
        
        label { font-size: 11px; color: #777; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 4px; }
        input, select { width: 100%; height: 45px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: #fff; appearance: none; -webkit-appearance: none; }
        
        /* Buttons */
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-blue { background: var(--blue); color: white; padding: 12px; width: 100%; margin-top: 10px; font-size: 14px; }
        .btn-green { background: var(--green); color: white; padding: 18px; width: 100%; font-size: 18px; box-shadow: 0 4px 12px rgba(40,167,69,0.2); }
        .btn-del { background: #ff4d4d; color: white; width: 40px; height: 45px; font-size: 20px; line-height: 45px; padding: 0; }

        .total-banner { background: var(--dark); color: white; padding: 15px; border-radius: 10px; text-align: right; font-weight: bold; font-size: 22px; margin: 15px 0; }

        /* History Table */
        .history-section { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px; background: #f0f0f0; border-radius: 5px; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .view-link { color: var(--blue); font-weight: bold; text-decoration: none; border: 1px solid var(--blue); padding: 4px 8px; border-radius: 5px; }

        .footer { text-align: center; padding: 25px; color: #999; font-size: 12px; }
    </style>
</head>
<body>

<div class="card" style="text-align:center">
    <h2 style="margin:0; color:var(--blue); font-size: 20px;">ARSHAD SALES PRO</h2>
    <input type="date" id="reportDate" style="border:none; text-align:center; font-weight:bold; color:#555; width:auto; height:auto; margin-top:5px;">
</div>

<div id="shopsContainer"></div>

<div class="total-banner">
    TOTAL: $<span id="grandTotal">0.00</span>
</div>

<button class="btn btn-blue" onclick="addShop()">+ ADD ANOTHER SHOP</button>
<div style="margin: 15px 0;">
    <button class="btn btn-green" onclick="processReport()">DOWNLOAD & SAVE PDF</button>
</div>

<div class="card history-section">
    <h3 style="margin-top:0">Report History</h3>
    <div id="historyList">
        <p style="color:#aaa; font-style:italic; font-size:13px;">No reports saved yet.</p>
    </div>
    <button onclick="clearHistory()" style="background:none; border:none; color:red; font-size:11px; padding:0; margin-top:10px;">Clear all history</button>
</div>

<div class="footer">
    Developed by <b>ARSHAD</b><br>
    WhatsApp: +243 902 702 275
</div>

<script>
    // Full product list
    const products = [
        {code: "DRC1201", name: "CAFE GINKO EN POUDRE ET GINSENG EN POUDR", price: 13.00},
        {code: "DRC1202", name: "CAFÉ DE THE VERT AVEC POUDRE GANODERMA", price: 14.00},
        {code: "DRC1203", name: "CAFÉ KACIP FATIMA AVEC POUDRE GANODERMA", price: 14.00},
        {code: "DRC1204", name: "CAFE AVEC LA POUDRE DE TONGKAT ET MACCA", price: 14.00},
        {code: "DRC1205", name: "CAFÉ CUPPUCCINO AVEC LA POUDRE GANODERMA", price: 15.00},
        {code: "DRC1802A", name: "D.I. LIQUID ALFALFA PLUS GUARANA 500ML", price: 20.00},
        {code: "DRC1804", name: "GANODERMA CAFE (20x21g)", price: 11.00},
        {code: "DRC1810", name: "CAPSULE DE YEE GANO 90's", price: 23.00},
        {code: "DRC1811", name: "YEEGARLIC CAPSULE 90's", price: 23.00},
        {code: "DRC1814", name: "GANODERMA CHOCOLAT (30'sX 30's)", price: 19.00},
        {code: "DRC1817", name: "CAFÉ CHOIX DU PRESIDENT 4 EN 1", price: 15.00},
        {code: "DRC1818", name: "CAFÉ NOIR GANODERMA ET TONGKATI ALI", price: 12.00},
        {code: "DRC2802", name: "COMPRIMES LAIT DE CHEVRE 150's", price: 18.00},
        {code: "DRC2804", name: "POUDRE INSTANTANEE DES GAINES DE SOJA", price: 14.00},
        {code: "DRC2805", name: "MARINE SOLUBLE SPIRULLINA", price: 25.00},
        {code: "DRC2807", name: "COMPRIME DE SPIRULINA (300's)", price: 30.00},
        {code: "DRC2812", name: "HERBA WARISAN MAHARANI", price: 36.00},
        {code: "DRC2813", name: "MELANGE INSTANTANE DE SOJA GINGEMBRE", price: 14.00},
        {code: "DRC2814", name: "LAIT DE CHEVRE EN 1 ET POUDRE (PREMIX)", price: 18.00},
        {code: "DRC3804", name: "DYNA TONIC 780ml", price: 33.00},
        {code: "DRC3809", name: "YEE YANG YEN TABLET 90's", price: 25.00},
        {code: "DRC3810", name: "RED COFFEE WITH GINSENG 12's x 25g", price: 12.00},
        {code: "DRC3812", name: "GREEN TEA EXTRACT CAPSULE 60's", price: 22.00},
        {code: "DRC3814", name: "PROLINK 20's x 20g", price: 20.00},
        {code: "DRC4803", name: "GINSENG MIEL ET GINGEMBRE", price: 15.00},
        {code: "DRC4805", name: "GINSENG CAPSULE 9 x 10's", price: 28.00},
        {code: "DRC4810", name: "CAFÉ TONGKAT ALI (20x21g)", price: 11.00},
        {code: "DRC4811", name: "GINALI CAPSULE 100's", price: 25.00},
        {code: "DRC4815", name: "YEEGINKGO TABLET 90's", price: 23.00},
        {code: "DRC4817", name: "MILK THISTLE TABLET 120's", price: 28.00},
        {code: "DRC4821", name: "TONGKAT ALI CAPSULE 100's", price: 30.00},
        {code: "DRC4824", name: "SEA CUCUMBER JELLY 500ml", price: 25.00},
        {code: "DRC5802N", name: "NONI 500ml", price: 24.00},
        {code: "DRC5803", name: "NONI PLUS TEA 30's x 3g", price: 16.00},
        {code: "DRC5806", name: "DYNA 'S' TABLET 120's", price: 28.00},
        {code: "DRC9918", name: "DYNA SERENOA TABLET 100's", price: 28.00}
    ].sort((a,b) => a.name.localeCompare(b.name));

    document.getElementById('reportDate').valueAsDate = new Date();

    function addShop() {
        const container = document.getElementById('shopsContainer');
        const shopDiv = document.createElement('div');
        shopDiv.className = 'shop-box';
        shopDiv.innerHTML = `
            <input type="text" class="shop-name" placeholder="Enter Shop Name" style="margin-bottom:15px; border-bottom:2px solid var(--blue); font-weight:bold;">
            <div class="items-list"></div>
            <button class="btn btn-blue" onclick="addItem(this.previousElementSibling)" style="background:#eee; color:#333; margin-top:5px;">+ Add Item</button>
            <button onclick="this.parentElement.remove(); updateGrandTotal();" style="position:absolute; top:5px; right:5px; border:none; background:none; color:red; font-size:20px;">×</button>
        `;
        container.appendChild(shopDiv);
        addItem(shopDiv.querySelector('.items-list'));
    }

    function addItem(listContainer) {
        const row = document.createElement('div');
        row.className = 'row';
        let options = products.map(p => `<option value="${p.price}|${p.code}|${p.name}">${p.name}</option>`).join('');
        
        row.innerHTML = `
            <div><label>Product</label><select class="p-select" onchange="updateGrandTotal()">${options}</select></div>
            <div><label>Qty</label><input type="number" class="p-qty" value="0" oninput="updateGrandTotal()" onfocus="this.select()"></div>
            <div><label>Stock</label><input type="number" class="p-stock" value="0"></div>
            <button class="btn btn-del" onclick="this.parentElement.remove(); updateGrandTotal();">×</button>
        `;
        listContainer.appendChild(row);
        updateGrandTotal();
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('.row').forEach(row => {
            const price = parseFloat(row.querySelector('.p-select').value.split('|')[0]);
            const qty = parseInt(row.querySelector('.p-qty').value) || 0;
            total += (price * qty);
        });
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function processReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const date = document.getElementById('reportDate').value;
        const total = document.getElementById('grandTotal').innerText;

        doc.setFontSize(20);
        doc.text("GLOBAL SALES REPORT", 105, 15, { align: "center" });
        doc.setFontSize(10);
        doc.text("Date: " + date, 14, 25);

        let yPos = 35;
        document.querySelectorAll('.shop-box').forEach(box => {
            const name = box.querySelector('.shop-name').value || "SHOP";
            let rows = [];
            box.querySelectorAll('.row').forEach(r => {
                const [price, code, pName] = r.querySelector('.p-select').value.split('|');
                const qty = r.querySelector('.p-qty').value;
                rows.push([code, pName, qty, "$" + price, "$" + (price * qty).toFixed(2)]);
            });
            doc.setFontSize(12);
            doc.text("SHOP: " + name.toUpperCase(), 14, yPos);
            doc.autoTable({ startY: yPos + 2, head: [['Code', 'Product', 'Qty', 'Price', 'Total']], body: rows });
            yPos = doc.lastAutoTable.finalY + 10;
        });

        // Save to History
        const pdfData = doc.output('datauristring');
        const history = JSON.parse(localStorage.getItem('arshad_history') || '[]');
        history.unshift({ date, total, file: pdfData });
        if(history.length > 15) history.pop();
        localStorage.setItem('arshad_history', JSON.stringify(history));

        doc.save(`Sales_${date}.pdf`);
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('arshad_history') || '[]');
        const container = document.getElementById('historyList');
        if(history.length === 0) return;
        
        let html = '<table><thead><tr><th>Date</th><th>Total</th><th>PDF</th></tr></thead><tbody>';
        history.forEach((item, idx) => {
            html += `<tr><td>${item.date}</td><td>$${item.total}</td><td><a href="#" class="view-link" onclick="viewPdf(${idx})">OPEN</a></td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function viewPdf(index) {
        const history = JSON.parse(localStorage.getItem('arshad_history') || '[]');
        const pdfWindow = window.open("");
        pdfWindow.document.write(`<iframe width='100%' height='100%' src='${history[index].file}'></iframe>`);
    }

    function clearHistory() {
        if(confirm("Clear all history?")) {
            localStorage.removeItem('arshad_history');
            location.reload();
        }
    }

    window.onload = () => { addShop(); renderHistory(); };
</script>
</body>
</html>
