<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Sales System - Pro Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: white; --text: #333; --border: #ccc; --accent: #1a73e8; }
        .dark-mode { --bg: #18191a; --card: #242526; --text: #e4e6eb; --border: #3e4042; --accent: #4dabf7; }

        body { font-family: -apple-system, sans-serif; padding: 10px; background: var(--bg); color: var(--text); padding-bottom: 80px; transition: 0.3s; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: var(--accent); margin-top: 5px; text-transform: uppercase; font-size: 20px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .btn-clear { background: #d93025; color: white; border:none; border-radius: 5px; padding: 5px 10px; font-size: 11px; cursor: pointer; }
        .dark-toggle { background: #333; color: white; border:none; border-radius: 5px; padding: 5px 10px; font-size: 11px; cursor: pointer; }

        .date-container { text-align: center; margin: 15px 0; background: #fffde7; padding: 10px; border-radius: 8px; border: 1px solid #fbc02d; }
        #reportDate { width: 90%; max-width: 250px; padding: 12px; border: 2px solid #1a73e8; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; background: white; color: black; display: inline-block; }

        .shop-box { border: 2px solid #1a73e8; padding: 12px; border-radius: 8px; margin-bottom: 20px; background: var(--card); display: flex; flex-direction: column; }
        
        /* THE LONG RED DELETE BUTTON AT THE TOP */
        .shop-del { background: #d93025; color: white; border:none; padding: 10px; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 10px; }

        /* SHOP NAME INPUT FIELD UNDER THE BUTTON AS REQUESTED */
        .shop-name { width: 100%; padding: 12px; font-weight: bold; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 15px; font-size: 15px; background: var(--card); color: var(--text); box-sizing: border-box; }

        .item-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr auto; gap: 5px; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; align-items: end; }
        .search-inner { background: #fffde7; padding: 5px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #fbc02d; font-size: 11px; width: 100%; box-sizing: border-box; color: #333; }
        label { font-weight: bold; font-size: 10px; color: #666; display: block; margin-bottom: 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing: border-box; background: var(--card); color: var(--text); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .add-shop { background: #333; color: white; }
        .load-all { background: #e67e22; color: white; margin-bottom: 10px; font-size: 13px; }
        .add-item { background: #e8f0fe; color: #1a73e8; border: 1px dashed #1a73e8; }
        .pdf-btn { background: #28a745; color: white; font-size: 18px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .del-btn { background: #ffeded; color: #d93025; width: 35px; padding: 5px; font-size: 16px; border: 1px solid #f5c6cb; }
        
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #888; border-top: 1px solid var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="top-bar">
        <button class="btn-clear" onclick="clearEverything()">🗑️ START NEW</button>
        <button class="dark-toggle" onclick="toggleDarkMode()">🌓 THEME</button>
    </div>

    <h2>Sales Report</h2>
    
    <div class="date-container">
        <label>Report Date</label>
        <input type="date" id="reportDate" onchange="saveAll()">
    </div>

    <div id="shopsContainer"></div>

    <button class="add-shop" onclick="addShop()">+ ADD NEW SHOP</button>
    <button class="pdf-btn" onclick="generatePDF()">DOWNLOAD PDF REPORT</button>

    <div class="footer">
        Developed by: <b>ARSHAD</b> | WhatsApp: <b>+243 902 702 275</b>
    </div>
</div>

<script>
    const products = [
        {code: "DRC1201", name: "GINKO GINSENG COFFEE", price: 13.00},
        {code: "DRC1202", name: "GREEN TEA GANO COFFEE", price: 14.00},
        {code: "DRC1203", name: "KACIP FATIMA GANO COFFEE", price: 14.00},
        {code: "DRC1204", name: "TONGKAT MACCA COFFEE", price: 14.00},
        {code: "DRC1205", name: "CAPPUCCINO GANO COFFEE", price: 15.00},
        {code: "DRC1802A", name: "ALFALFA GUARANA 500ML", price: 20.00},
        {code: "DRC1804", name: "GANODERMA COFFEE (20s)", price: 11.00},
        {code: "DRC1810", name: "YEE GANO 90s", price: 23.00},
        {code: "DRC1811", name: "YEEGARLIC 90's", price: 23.00},
        {code: "DRC1814", name: "GANO CHOCOLATE 30s", price: 19.00},
        {code: "DRC1817", name: "PRESIDENT COFFEE 4 IN 1", price: 15.00},
        {code: "DRC1818", name: "BLACK TONGKAT ALI COFFEE", price: 14.00},
        {code: "DRC2802", name: "GOAT MILK TABS 150's", price: 16.00},
        {code: "DRC2804", name: "SOYBEAN POWDER", price: 17.00},
        {code: "DRC2805", name: "SOLUBLE SPIRULLINA", price: 17.00},
        {code: "DRC2807", name: "SPIRULINA (300's)", price: 22.00},
        {code: "DRC2812", name: "HERBA MAHARANI", price: 36.00},
        {code: "DRC2813", name: "GINGER SOYBEAN", price: 14.00},
        {code: "DRC2814", name: "GOAT MILK PREMIX", price: 15.00},
        {code: "DRC3804", name: "DYNA TONIC 780ml", price: 33.00},
        {code: "DRC3809", name: "YEE YANG YEN 90's", price: 23.00},
        {code: "DRC3810", name: "RED GINSENG COFFEE", price: 13.00},
        {code: "DRC3812", name: "GREEN TEA CAPSULE 60's", price: 23.00},
        {code: "DRC3814", name: "PROLINK 20's", price: 36.00},
        {code: "DRC4803", name: "GINSENG HONEY & GINGER", price: 17.00},
        {code: "DRC4805", name: "GINSENG CAPSULE 90s", price: 31.00},
        {code: "DRC4810", name: "TONGKAT ALI COFFEE (20s)", price: 11.00},
        {code: "DRC4811", name: "GINALI CAPSULE 100's", price: 27.00},
        {code: "DRC4815", name: "YEEGINKGO TABLET 90's", price: 23.00},
        {code: "DRC4817", name: "MILK THISTLE 120's", price: 36.00},
        {code: "DRC4821", name: "TONGKAT ALI 100's", price: 21.00},
        {code: "DRC4824", name: "SEA CUCUMBER JELLY", price: 31.00},
        {code: "DRC5802N", name: "NONI 500ml", price: 26.00},
        {code: "DRC5803", name: "NONI PLUS TEA 30's", price: 19.00},
        {code: "DRC5806", name: "DYNA 'S' TABLET 120's", price: 21.00},
        {code: "DRC9918", name: "DYNA SERENOA 100's", price: 32.00}
    ];

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    function clearEverything() {
        if(confirm("Start new report? This will clear current data.")) {
            localStorage.removeItem('dynapharmData');
            location.reload();
        }
    }

    function addShop(data = null) {
        const container = document.getElementById('shopsContainer');
        const div = document.createElement('div');
        div.className = 'shop-box';
        div.innerHTML = `
            <button class="shop-del" onclick="this.parentElement.remove(); saveAll();">DELETE</button>
            <input type="text" class="shop-name" placeholder="SHOP NAME" oninput="saveAll()">
            <div class="items-list"></div>
            <button class="load-all" onclick="loadAllProducts(this)">⚡ LOAD ALL PRODUCTS</button>
            <button class="add-item" onclick="addItem(this)">+ ADD ONE</button>
        `;
        container.appendChild(div);
        if (data) {
            div.querySelector('.shop-name').value = data.name;
            data.items.forEach(item => addItem(div.querySelector('.add-item'), item));
        }
    }

    function loadAllProducts(btn) {
        const list = btn.parentElement.querySelector('.items-list');
        list.innerHTML = ""; 
        products.forEach(p => {
            addItem(btn, { val: `${p.price}|${p.code}|${p.name}`, sold: 0, stock: 0 });
        });
        saveAll();
    }

    function addItem(btn, data = null) {
        const list = btn.parentElement.querySelector('.items-list');
        const row = document.createElement('div');
        row.className = 'item-row';
        let opts = products.map(p => `<option value="${p.price}|${p.code}|${p.name}">${p.code} - ${p.name}</option>`).join('');
        row.innerHTML = `
            <div>
                <label>🔍 Search</label>
                <input type="text" class="search-inner" placeholder="Code" oninput="filterLocalSelect(this)">
                <select class="pData" onchange="updateRowPrice(this); saveAll();">${opts}</select>
            </div>
            <div><label>Price</label><input type="number" class="pPrice" readonly></div>
            <div><label>Sold</label><input type="number" class="pSold" value="0" onfocus="this.select()" oninput="saveAll()" onkeydown="handleEnter(event, 'sold')"></div>
            <div><label>Stock</label><input type="number" class="pStock" value="0" onfocus="this.select()" oninput="saveAll()" onkeydown="handleEnter(event, 'stock')"></div>
            <button class="del-btn" onclick="this.parentElement.remove(); saveAll();">×</button>
        `;
        list.appendChild(row);
        const sel = row.querySelector('.pData');
        if (data) {
            sel.value = data.val;
            row.querySelector('.pSold').value = data.sold;
            row.querySelector('.pStock').value = data.stock;
        }
        updateRowPrice(sel);
    }

    function updateRowPrice(sel) {
        sel.parentElement.parentElement.querySelector('.pPrice').value = sel.value.split('|')[0];
    }

    function handleEnter(e, type) {
        if (e.key === "Enter") {
            const row = e.target.closest('.item-row');
            if (type === 'sold') {
                row.querySelector('.pStock').focus();
            } else {
                const nextRow = row.nextElementSibling;
                if (nextRow) nextRow.querySelector('.pSold').focus();
            }
        }
    }

    function filterLocalSelect(input) {
        const val = input.value.toUpperCase();
        const select = input.nextElementSibling;
        Array.from(select.options).forEach(opt => {
            opt.style.display = opt.text.toUpperCase().includes(val) ? "" : "none";
            if (val !== "" && opt.text.toUpperCase().includes(val)) select.value = opt.value;
        });
        updateRowPrice(select);
        saveAll();
    }

    function saveAll() {
        const shops = [];
        document.querySelectorAll('.shop-box').forEach(box => {
            const items = [];
            box.querySelectorAll('.item-row').forEach(row => {
                items.push({ val: row.querySelector('.pData').value, sold: row.querySelector('.pSold').value, stock: row.querySelector('.pStock').value });
            });
            shops.push({ name: box.querySelector('.shop-name').value, items });
        });
        localStorage.setItem('dynapharmData', JSON.stringify({
            date: document.getElementById('reportDate').value,
            shops: shops
        }));
    }

    window.onload = () => {
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        const saved = JSON.parse(localStorage.getItem('dynapharmData'));
        if (saved) {
            document.getElementById('reportDate').value = saved.date;
            saved.shops.forEach(s => addShop(s));
        } else {
            document.getElementById('reportDate').valueAsDate = new Date();
            addShop();
        }
    };
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const date = document.getElementById('reportDate').value;
        // Format date to DD/MM/YYYY for the text
        const dateObj = new Date(date);
        const formattedDate = dateObj.toLocaleDateString('fr-FR');
        
        // --- HEADER TEXT ---
        doc.setFontSize(16); 
        doc.setTextColor(230, 126, 34); // Orange
        doc.text("RAPPORT GLOBAL DES VENTES & INVENTAIRE", 14, 20);
        
        doc.setFontSize(10); 
        doc.setTextColor(0);
        doc.text("Date ciblée : " + formattedDate, 14, 28);
        doc.text("Ce document récapitule les ventes de toutes les boutiques pour la journée indiquée.", 14, 33);

        let grandTotal = 0;
        let summaries = [];
        let details = [];

        document.querySelectorAll('.shop-box').forEach(box => {
            const name = (box.querySelector('.shop-name').value || "SHOP").toUpperCase();
            let shopTotal = 0;
            let rows = [];
            box.querySelectorAll('.item-row').forEach(row => {
                const [price, code, pName] = row.querySelector('.pData').value.split('|');
                const sold = parseInt(row.querySelector('.pSold').value) || 0;
                const stock = row.querySelector('.pStock').value || 0;
                const totalLine = parseFloat(price) * sold;
                shopTotal += totalLine;
                rows.push([code, pName, "$" + parseFloat(price).toFixed(2), sold, stock, "$" + totalLine.toFixed(2)]);
            });
            grandTotal += shopTotal;
            summaries.push([name, "$" + shopTotal.toFixed(2)]);
            details.push({name, total: shopTotal, rows});
        });

        // --- ORANGE SUMMARY TABLE ---
        doc.autoTable({
            startY: 40, 
            head: [['Boutique', 'Total des Ventes ($)']],
            body: summaries,
            headStyles: { fillColor: [230, 126, 34] }, // Orange
            theme: 'striped'
        });

        // Total Général Line
        let finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(12);
        doc.setTextColor(230, 126, 34); // Orange
        doc.setFont("helvetica", "bold");
        doc.text("TOTAL GÉNÉRAL DU JOUR (TOUS SHOPS) :", 14, finalY);
        doc.text("$" + grandTotal.toFixed(2), 196, finalY, { align: "right" });

        let currentY = finalY + 15;
        
        // --- RED DETAIL TABLES ---
        details.forEach(shop => {
            if (currentY > 240) { doc.addPage(); currentY = 20; }
            doc.setFontSize(11); 
            doc.setTextColor(211, 47, 47); // Red
            doc.setFont("helvetica", "bold");
            doc.text(`DÉTAIL : ${shop.name} ( Ventes = $${shop.total.toFixed(2)} )`, 14, currentY);
            
            doc.autoTable({
                startY: currentY + 4,
                head: [['Code', 'Désignation', 'Prix Unit.', 'Vendu', 'Reste (Stock)', 'Total $']],
                body: shop.rows,
                headStyles: { fillColor: [190, 30, 30] }, // Deep Red
                styles: { fontSize: 8 },
                theme: 'striped'
            });
            currentY = doc.lastAutoTable.finalY + 15;
        });

        doc.save(`Ventes_Globales_TousShops_${date}.pdf`);
    }

    <script src="https://pl28856086.effectivegatecpm.com/4d/d3/ad/4dd3ad32f22e48f7313f97fb2f44aa0c.js"></script>
</body>
</html>
