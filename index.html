<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DYNAPHARM MASTER SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQoBJhPYyYfvPSWsWse3OgfMxNmd24iXQ",
            authDomain: "business-arshad.firebaseapp.com",
            projectId: "business-arshad",
            storageBucket: "business-arshad.firebasestorage.app",
            messagingSenderId: "1097198781152",
            appId: "1:1097198781152:web:67f22b2dc944c93b240685"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // This replaces the broken window.db.collection function
        window.saveReport = async (data) => {
            try {
                const docRef = await addDoc(collection(db, "sales_reports"), data);
                console.log("Success! ID:", docRef.id);
                return true;
            } catch (error) {
                alert("Cloud Error: " + error.message);
                return false;
            }
        };
    </script>

    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f7f6; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #333; color: white; margin-bottom: 10px; }
        .btn-main { background: #28a745; color: white; font-size: 16px; }
        .shop-entry { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; position: relative; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>DYNAPHARM SYSTEM</h2>
    
    <label>Date</label>
    <input type="date" id="dateSelect">

    <div id="shopContainer"></div>
    <button class="btn btn-add" onclick="addNewShop()">+ ADD SHOP</button>
    <button id="submitBtn" class="btn btn-main" onclick="handleSubmission()">DOWNLOAD PDF & SAVE CLOUD</button>

    <div class="footer">
        Developed by: <b>ARSHAD</b><br>
        WhatsApp: <b>+243 902 702 275</b>
    </div>
</div>

<script>
    document.getElementById('dateSelect').valueAsDate = new Date();

    function addNewShop() {
        const container = document.getElementById('shopContainer');
        const div = document.createElement('div');
        div.className = 'shop-entry';
        div.innerHTML = `
            <input type="text" class="sName" placeholder="Shop Name">
            <input type="number" class="sTotal" placeholder="Total Sales Amount ($)">
        `;
        container.appendChild(div);
    }

    async function handleSubmission() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "⌛ PROCESSING...";
        btn.disabled = true;

        const date = document.getElementById('dateSelect').value;
        const shops = [];
        let grandTotal = 0;

        document.querySelectorAll('.shop-entry').forEach(row => {
            const name = row.querySelector('.sName').value || "Shop";
            const amt = parseFloat(row.querySelector('.sTotal').value) || 0;
            shops.push({ name, amt });
            grandTotal += amt;
        });

        // 1. Save to Cloud
        const cloudOk = await window.saveReport({
            date: date,
            shops: shops,
            total: grandTotal,
            timestamp: new Date().toISOString()
        });

        if (cloudOk) {
            // 2. Make PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("DYNAPHARM SALES REPORT", 105, 20, { align: "center" });
            doc.text(`Date: ${date}`, 20, 30);
            
            doc.autoTable({
                startY: 40,
                head: [['Shop', 'Amount']],
                body: [...shops.map(s => [s.name, `$${s.amt.toFixed(2)}`]), ['GRAND TOTAL', `$${grandTotal.toFixed(2)}`]]
            });

            doc.save(`Report_${date}.pdf`);
            alert("Success! Saved to Cloud & PDF Downloaded.");
        }

        btn.innerText = "DOWNLOAD PDF & SAVE CLOUD";
        btn.disabled = false;
    }

    addNewShop();
</script>
</body>
</html>
