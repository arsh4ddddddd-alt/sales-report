<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DYNAPHARM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #212529; --border: #dee2e6; --accent: #1a73e8; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --border: #333333; --accent: #4dabf7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .header-btns { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .btn-clear { background: #fa5252; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 11px; }
        .btn-theme { background: #495057; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 11px; }
        h1 { text-align: center; color: #d32f2f; margin: 10px 0; font-size: 24px; }
        .date-section { text-align: center; margin-bottom: 15px; }
        #reportDate { width: 100%; max-width: 200px; padding: 10px; border: 2px solid var(--accent); border-radius: 5px; font-weight: bold; text-align: center; }
        .shop-box { border: 2px solid var(--accent); border-radius: 8px; padding: 10px; margin-bottom: 20px; position: relative; background: var(--card); }
        .shop-name-input { width: 80%; padding: 8px; font-weight: bold; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
        .remove-shop { position: absolute; top: 5px; right: 5px; background: #ff5252; color: white; border: none; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        .product-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 30px; gap: 5px; margin-bottom: 8px; align-items: end; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .search-box { background: #fffde7; border: 1px solid #fbc02d; font-size: 11px; padding: 3px; border-radius: 3px; width: 100%; margin-bottom: 2px; }
        label { font-size: 8px; color: #888; display: block; }
        input, select { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); color: var(--text); font-size: 12px; }
        .btn-load { background: #fd7e14; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; margin-bottom: 5px; }
        .btn-add { background: #e7f5ff; color: #1a73e8; border: 1px dashed #1a73e8; padding: 8px; border-radius: 5px; width: 100%; font-weight: bold; }
        .btn-pdf { background: #40c057; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-btns">
            <button class="btn-clear" onclick="startFresh()">🗑️ START NEW</button>
            <button class="btn-theme" onclick="toggleMode()">🌓 THEME</button>
        </div>

        <h1>DYNAPHARM</h1>

        <div class="date-section">
            <label>DATE DU RAPPORT</label>
            <input type="date" id="reportDate" onchange="autoSave()">
        </div>

        <div id="allShops"></div>

        <button style="background:#343a40; color:white; padding:12px; border-radius:8px; width:100%; font-weight:bold; margin-top:10px;" onclick="addNewShop()">+ AJOUTER BOUTIQUE</button>
        <button class="btn-pdf" onclick="makePDF()">TÉLÉCHARGER PDF</button>
    </div>

<script>
const DB = [
    {c:"DRC1201", n:"CAFE GINKO GINSENG", p:13}, {c:"DRC1202", n:"CAFE THE VERT GANO", p:14},
    {c:"DRC1203", n:"CAFE KACIP FATIMA", p:14}, {c:"DRC1204", n:"CAFE TONGKAT MACCA", p:14},
    {c:"DRC1205", n:"CAFE CUPPUCCINO GANO", p:15}, {c:"DRC1802A", n:"ALFALFA GUARANA 500ML", p:20},
    {c:"DRC1804", n:"GANODERMA CAFE 20s", p:11}, {c:"DRC1810", n:"YEE GANO 90s", p:23},
    {c:"DRC1811", n:"YEEGARLIC 90s", p:23}, {c:"DRC1814", n:"GANO CHOCOLAT 30s", p:19},
    {c:"DRC1817", n:"CAFE PRESIDENT 4IN1", p:15}, {c:"DRC1818", n:"CAFE NOIR TONGKAT", p:14},
    {c:"DRC2802", n:"LAIT CHEVRE TABS", p:16}, {c:"DRC2804", n:"SOJA POUDRE", p:17},
    {c:"DRC2805", n:"SPIRULINA SOLUBLE", p:17}, {c:"DRC2807", n:"SPIRULINA 300s", p:22},
    {c:"DRC2812", n:"MAHARANI", p:36}, {c:"DRC2813", n:"SOJA GINGEMBRE", p:14},
    {c:"DRC2814", n:"LAIT CHEVRE PREMIX", p:15}, {c:"DRC3804", n:"DYNA TONIC 780ML", p:33},
    {c:"DRC3809", n:"YEE YANG YEN 90s", p:23}, {c:"DRC3810", n:"RED COFFEE GINSENG", p:13},
    {c:"DRC3812", n:"GREEN TEA CAPS", p:23}, {c:"DRC3814", n:"PROLINK 20s", p:36},
    {c:"DRC4803", n:"GINSENG MIEL GINGEMBRE", p:17}, {c:"DRC4805", n:"GINSENG CAPS 90s", p:31},
    {c:"DRC4810", n:"CAFE TONGKAT ALI 20s", p:11}, {c:"DRC4811", n:"GINALI 100s", p:27},
    {c:"DRC4815", n:"YEEGINKGO 90s", p:23}, {c:"DRC4817", n:"MILK THISTLE 120s", p:36},
    {c:"DRC4821", n:"TONGKAT ALI 100s", p:21}, {c:"DRC4824", n:"SEA CUCUMBER JELLY", p:31},
    {c:"DRC5802N", n:"NONI 500ML", p:26}, {c:"DRC5803", n:"NONI TEA 30s", p:19},
    {c:"DRC5806", n:"DYNA S 120s", p:21}, {c:"DRC9918", n:"SERENOA 100s", p:32}
];

function toggleMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('mode', document.body.classList.contains('dark-mode')); }
function startFresh() { if(confirm("Tout effacer?")) { localStorage.removeItem('dyna_data'); location.reload(); } }

function addNewShop(data = null) {
    const div = document.createElement('div');
    div.className = 'shop-box';
    div.innerHTML = `<button class="remove-shop" onclick="this.parentElement.remove();autoSave()">X</button>
        <input type="text" class="shop-name-input" placeholder="NOM BOUTIQUE" oninput="autoSave()">
        <div class="product-list"></div>
        <button class="btn-load" onclick="load36(this)">⚡ CHARGER 36 PRODUITS</button>
        <button class="btn-add" onclick="addOne(this)">+ AJOUTER PRODUIT</button>`;
    document.getElementById('allShops').appendChild(div);
    if(data) { div.querySelector('.shop-name-input').value = data.name; data.items.forEach(i => addOne(div.querySelector('.btn-add'), i)); }
}

function load36(btn) {
    const list = btn.parentElement.querySelector('.product-list');
    list.innerHTML = "";
    DB.forEach(p => addOne(btn, {id: `${p.p}|${p.c}|${p.n}`, v:0, r:0}));
    autoSave();
}

function addOne(btn, data = null) {
    const list = btn.parentElement.querySelector('.product-list');
    const row = document.createElement('div');
    row.className = 'product-row';
    let opts = DB.map(p => `<option value="${p.p}|${p.c}|${p.n}">${p.c} - ${p.n}</option>`).join('');
    row.innerHTML = `<div><input type="text" class="search-box" placeholder="Code" oninput="filterP(this)"><select class="p-sel" onchange="updPrice(this);autoSave()">${opts}</select></div>
        <div><input type="number" class="p-pri" readonly></div>
        <div><input type="number" class="p-sold" value="0" onfocus="this.select()" oninput="autoSave()" onkeydown="nav(event,'v')"></div>
        <div><input type="number" class="p-rest" value="0" onfocus="this.select()" oninput="autoSave()" onkeydown="nav(event,'r')"></div>
        <button style="color:red;border:none;background:none" onclick="this.parentElement.remove();autoSave()">×</button>`;
    list.appendChild(row);
    const s = row.querySelector('.p-sel');
    if(data) { s.value = data.id; row.querySelector('.p-sold').value = data.v; row.querySelector('.p-rest').value = data.r; }
    updPrice(s);
}

function updPrice(s) { s.parentElement.parentElement.querySelector('.p-pri').value = s.value.split('|')[0]; }

function filterP(i) {
    const v = i.value.toUpperCase(); const s = i.nextElementSibling;
    Array.from(s.options).forEach(o => { o.style.display = o.text.includes(v) ? "" : "none"; if(v && o.text.includes(v)) s.value = o.value; });
    updPrice(s); autoSave();
}

function nav(e, t) {
    if(e.key === "Enter") {
        const r = e.target.closest('.product-row');
        if(t==='v') r.querySelector('.p-rest').focus();
        else { const n = r.nextElementSibling; if(n) n.querySelector('.p-sold').focus(); }
    }
}

function autoSave() {
    const shops = [];
    document.querySelectorAll('.shop-box').forEach(b => {
        const items = [];
        b.querySelectorAll('.product-row').forEach(r => { items.push({ id: r.querySelector('.p-sel').value, v: r.querySelector('.p-sold').value, r: r.querySelector('.p-rest').value }); });
        shops.push({ name: b.querySelector('.shop-name-input').value, items });
    });
    localStorage.setItem('dyna_data', JSON.stringify({ d: document.getElementById('reportDate').value, s: shops }));
}

window.onload = () => {
    if(localStorage.getItem('mode')==='true') document.body.classList.add('dark-mode');
    const saved = JSON.parse(localStorage.getItem('dyna_data'));
    if(saved) { document.getElementById('reportDate').value = saved.d; saved.s.forEach(sh => addNewShop(sh)); }
    else { document.getElementById('reportDate').valueAsDate = new Date(); addNewShop(); }
};

function makePDF() {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    const date = document.getElementById('reportDate').value;
    doc.setFontSize(22); doc.setTextColor(211, 47, 47); doc.text("DYNAPHARM", 105, 15, {align:"center"});
    let gTotal = 0; let summary = []; let details = [];
    document.querySelectorAll('.shop-box').forEach(b => {
        const sn = (b.querySelector('.shop-name-input').value || "SHOP").toUpperCase();
        let sTotal = 0; let rows = [];
        b.querySelectorAll('.product-row').forEach(r => {
            const [pr, co, na] = r.querySelector('.p-sel').value.split('|');
            const so = parseInt(r.querySelector('.p-sold').value) || 0;
            const line = parseFloat(pr) * so; sTotal += line;
            rows.push([co, na, "$"+pr, so, r.querySelector('.p-rest').value, "$"+line.toFixed(2)]);
        });
        gTotal += sTotal; summary.push([sn, "$"+sTotal.toFixed(2)]);
        details.push({sn, sTotal, rows});
    });
    doc.autoTable({ startY: 25, head: [['Boutique', 'Total ($)']], body: [...summary, ['TOTAL', "$"+gTotal.toFixed(2)]], headStyles:{fillColor:[211,47,47]} });
    let y = doc.lastAutoTable.finalY + 10;
    details.forEach(s => {
        doc.text(`Détail: ${s.sn}`, 14, y);
        doc.autoTable({ startY: y+2, head: [['Code', 'Nom', 'Prix', 'Vendu', 'Reste', 'Total']], body: s.rows, styles:{fontSize:7} });
        y = doc.lastAutoTable.finalY + 10;
    });
    doc.save(`Dyna_${date}.pdf`);
}
</script>
</body>
</html>
