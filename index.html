<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DYNAPHARM System - Model Exact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 650px; margin: auto; }
        h2 { text-align: center; color: #e67e22; text-transform: uppercase; font-size: 18px; margin-bottom: 20px; }
        .shop-box { border-left: 5px solid #d32f2f; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        .item-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 12px; align-items: end; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .search-inner { background: #fffde7; padding: 8px; border-radius: 6px; border: 1px solid #fbc02d; font-size: 12px; width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        label { font-weight: bold; font-size: 10px; color: #777; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-add { background: #2c3e50; color: white; }
        .btn-item { background: #fdf2f2; color: #d32f2f; border: 1px dashed #d32f2f; }
        .pdf-btn { background: #27ae60; color: white; font-size: 16px; margin-top: 25px; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .del-btn { background: none; color: #e74c3c; font-size: 24px; padding: 0; line-height: 1; margin-bottom: 5px; }
        .footer { text-align: center; margin-top: 30px; font-size: 11px; color: #aaa; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>RAPPORT GLOBAL DES VENTES</h2>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <label>Date du Rapport</label>
        <input type="date" id="reportDate">
    </div>

    <div id="shopsContainer"></div>

    <button class="btn-add" onclick="addShop()">+ NOUVELLE BOUTIQUE</button>
    <button class="pdf-btn" onclick="generatePDF()">GÉNÉRER LE PDF DU MODÈLE</button>

    <div class="footer">DÉVELOPPÉ PAR: <b>ARSHAD</b> | <b>+243 902 702 275</b></div>
</div>

<script>
    document.getElementById('reportDate').valueAsDate = new Date();

    const products = [
        {code: "DRC1201", name: "CAFE GINKO EN POUDRE ET GINSENG EN POUDR", price: 13.00},
        {code: "DRC1202", name: "CAFÉ DE THE VERT AVEC POUDRE GANODERMA", price: 14.00},
        {code: "DRC1203", name: "CAFÉ KACIP FATIMA AVEC POUDRE GANODERMA", price: 14.00},
        {code: "DRC1204", name: "CAFE AVEC LA POUDRE DE TONGKAT ET MACCA", price: 14.00},
        {code: "DRC1205", name: "CAFÉ CUPPUCCINO AVEC LA POUDRE GANODERMA", price: 15.00},
        {code: "DRC1802A", name: "D.I. LIQUID ALFALFA PLUS GUARANA 500ML", price: 20.00},
        {code: "DRC1804", name: "GANODERMA CAFE (20x21g)", price: 11.00},
        {code: "DRC1810", name: "CAPUSLE DE YEE GANO 90s", price: 23.00},
        {code: "DRC1811", name: "YEEGARLIC CAPSULE 90's", price: 23.00},
        {code: "DRC1814", name: "GANODERMA CHOCOLAT (30'sX 30's)", price: 19.00},
        {code: "DRC1817", name: "CAFÉ CHOIX DU PRESIDENT 4 EN 1", price: 15.00},
        {code: "DRC1818", name: "CAFÉ NOIR GANODERMA ET TONGKATI ALI", price: 14.00},
        {code: "DRC2802", name: "COMPRIMES DE LAIT DE CHEVRE 150's", price: 16.00},
        {code: "DRC2804", name: "POUDRE INSTANTANEE DES GAINES DE SOJA", price: 17.00},
        {code: "DRC2805", name: "MARINE SOLUBLE SPIRULLINA", price: 17.00},
        {code: "DRC2807", name: "COMPRIME DE SPIRULINA (300's)", price: 22.00},
        {code: "DRC2812", name: "HERBA WARISAN MAHARANI", price: 36.00},
        {code: "DRC2813", name: "MELANGE INSTANTANE DE SOJA GINGEMBRE", price: 14.00},
        {code: "DRC2814", name: "LAIT DE CHEVRE EN 1 ET POUDRE (PREMIX)", price: 15.00},
        {code: "DRC3804", name: "DYNA TONIC 780ml", price: 33.00},
        {code: "DRC3809", name: "YEE YANG YEN TABLET 90's", price: 23.00},
        {code: "DRC3810", name: "RED COFFEE WITH GINSENG 12's x 25g", price: 13.00},
        {code: "DRC3812", name: "GREEN TEA EXTRACT CAPSULE 60's", price: 23.00},
        {code: "DRC3814", name: "PROLINK 20's x 20g", price: 36.00},
        {code: "DRC4803", name: "GINSENG MIEL ET GINGEMBRE", price: 17.00},
        {code: "DRC4805", name: "GINSENG CAPSULE 9 x 10's", price: 31.00},
        {code: "DRC4810", name: "CAFÉ TONGKAT ALI (20x21g)", price: 11.00},
        {code: "DRC4811", name: "GINALI CAPSULE 100's", price: 27.00},
        {code: "DRC4815", name: "YEEGINKGO TABLET 90's", price: 23.00},
        {code: "DRC4817", name: "MILK THISTLE TABLET 120's", price: 36.00},
        {code: "DRC4821", name: "TONGKAT ALI CAPSULE 100's", price: 21.00},
        {code: "DRC4824", name: "SEA CUCUMBER JELLY 500ml", price: 31.00},
        {code: "DRC5802N", name: "NONI 500ml", price: 26.00},
        {code: "DRC5803", name: "NONI PLUS TEA 30's x 3g", price: 19.00},
        {code: "DRC5806", name: "DYNA 'S' TABLET 120's", price: 21.00},
        {code: "DRC9918", name: "DYNA SERENOA TABLET 100's", price: 32.00}
    ];

    function addShop() {
        const container = document.getElementById('shopsContainer');
        const div = document.createElement('div');
        div.className = 'shop-box';
        div.innerHTML = `
            <button style="position:absolute; top:8px; right:8px; background:none; color:#e74c3c; font-weight:bold; cursor:pointer;" onclick="this.parentElement.remove()">SUPPRIMER X</button>
            <input type="text" class="shopName" placeholder="NOM DE LA BOUTIQUE (ex: KAPENDA)" style="font-weight:bold; border:none; border-bottom:2px solid #eee; width:60%; margin-bottom:15px; font-size:16px;">
            <div class="items-list"></div>
            <button class="btn-item" onclick="addItem(this)">+ AJOUTER UN PRODUIT</button>
        `;
        container.appendChild(div);
        addItem(div.querySelector('.btn-item'));
    }

    function addItem(btn) {
        const list = btn.parentElement.querySelector('.items-list');
        const row = document.createElement('div');
        row.className = 'item-row';
        let options = products.map(p => `<option value="${p.price}|${p.code}|${p.name}">${p.code} - ${p.name}</option>`).join('');
        row.innerHTML = `
            <div>
                <label>🔍 Code</label>
                <input type="text" class="search-inner" placeholder="ex: 1201" oninput="filterLocalSelect(this)">
                <select class="pData">${options}</select>
            </div>
            <div><label>Prix($)</label><input type="number" class="pPrice" readonly></div>
            <div><label>Vendu</label><input type="number" class="pSold" value="0" onfocus="this.select()"></div>
            <div><label>Reste</label><input type="number" class="pStock" value="0" onfocus="this.select()"></div>
            <button class="del-btn" onclick="this.parentElement.remove()">×</button>
        `;
        list.appendChild(row);
        const sel = row.querySelector('.pData');
        sel.addEventListener('change', () => { row.querySelector('.pPrice').value = sel.value.split('|')[0]; });
        row.querySelector('.pPrice').value = sel.value.split('|')[0];
    }

    function filterLocalSelect(input) {
        const val = input.value.toUpperCase();
        const select = input.nextElementSibling;
        Array.from(select.options).forEach(opt => {
            opt.style.display = opt.text.toUpperCase().includes(val) ? "" : "none";
            if (val !== "" && opt.text.toUpperCase().includes(val)) select.value = opt.value;
        });
        select.dispatchEvent(new Event('change'));
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const date = document.getElementById('reportDate').value;

        // Header - Model Orange
        doc.setFontSize(18);
        doc.setTextColor(230, 126, 34); 
        doc.text("RAPPORT GLOBAL DES VENTES & INVENTAIRE", 105, 18, { align: "center" });

        // Meta
        doc.setFontSize(10);
        doc.setTextColor(40);
        doc.text("Date ciblée: " + date, 14, 28);
        doc.setFont("helvetica", "italic");
        doc.text("Ce document récapitule les ventes de toutes les boutiques pour la journée indiquée.", 14, 33);

        let grandTotal = 0;
        let summaries = [];
        let details = [];

        document.querySelectorAll('.shop-box').forEach(box => {
            const name = (box.querySelector('.shopName').value || "BOUTIQUE").toUpperCase();
            let shopTotal = 0;
            let rows = [];

            box.querySelectorAll('.item-row').forEach(row => {
                const [price, code, pName] = row.querySelector('.pData').value.split('|');
                const sold = parseInt(row.querySelector('.pSold').value) || 0;
                const stock = row.querySelector('.pStock').value || 0;
                const totalLine = parseFloat(price) * sold;
                shopTotal += totalLine;
                rows.push([code, pName, "$" + parseFloat(price).toFixed(2), sold, stock, {content: "$" + totalLine.toFixed(2), styles: {fontStyle: 'bold'}}]);
            });

            grandTotal += shopTotal;
            summaries.push([name, {content: "$" + shopTotal.toFixed(2), styles: {fontStyle: 'bold'}}]);
            details.push({name, total: shopTotal, rows});
        });

        // Summary - Orange Theme
        doc.autoTable({
            startY: 40,
            head: [['Boutique', 'Total des Ventes ($)']],
            body: [...summaries, [{content: 'TOTAL GÉNÉRAL DU JOUR (TOUS SHOPS)', styles: {fontStyle: 'bold'}}, {content: "$" + grandTotal.toFixed(2), styles: {fontStyle: 'bold'}}]],
            headStyles: { fillColor: [230, 126, 34] },
            theme: 'grid'
        });

        // Shop Details - Model Red Theme (200, 30, 30)
        let currentY = doc.lastAutoTable.finalY + 15;
        details.forEach(shop => {
            if (currentY > 240) { doc.addPage(); currentY = 20; }
            doc.setFontSize(12);
            doc.setTextColor(200, 30, 30); // Lighter Professional Red
            doc.setFont("helvetica", "bold");
            doc.text(`DÉTAIL: ${shop.name} (Ventes = $${shop.total.toFixed(2)})`, 14, currentY);
            
            doc.autoTable({
                startY: currentY + 4,
                head: [['Code', 'Désignation', 'Prix Unit.', 'Vendu', 'Reste (Stock)', 'Total $']],
                body: shop.rows,
                headStyles: { fillColor: [200, 30, 30] },
                styles: { fontSize: 8, textColor: 0 },
                columnStyles: { 5: { fontStyle: 'bold' } },
                theme: 'striped'
            });
            currentY = doc.lastAutoTable.finalY + 15;
        });

        doc.save(`Ventes_Globales_${date}.pdf`);
    }
    addShop();
</script>
</body>
</html>
