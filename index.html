<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynapharm Sales System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .shop-section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; background: #fafafa; position: relative; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        input { width: 100%; box-sizing: border-box; padding: 5px; }
        .controls { margin-bottom: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; }
        .pdf-btn { background-color: #007bff; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dynapharm Sales Report</h1>
    <div class="controls">
        <button onclick="addShop()">Add Shop</button>
        <button class="pdf-btn" onclick="generatePDF()">Download PDF</button>
    </div>
    <div id="shopsContainer"></div>
</div>

<script>
    let shopCount = 0;
    const products = [
        { code: "1201", name: "CHLOROPHYLL 500ML" },
        { code: "1202", name: "CHLOROPHYLL 250ML" },
        { code: "2205", name: "GINSENG COFFEE 2 IN 1" },
        { code: "2217", name: "TONGKAT ALI COFFEE 5 IN 1" },
        { code: "3301", name: "YEE YANG TABLET" },
        { code: "3305", name: "SEA CUCUMBER JELLY" }
    ];

    function addShop() {
        shopCount++;
        const container = document.getElementById('shopsContainer');
        const shopDiv = document.createElement('div');
        shopDiv.className = 'shop-section';
        shopDiv.id = `shop-${shopCount}`;
        
        let tableHtml = `
            <button class="delete-btn" onclick="removeShop(${shopCount})">Delete</button>
            <label>Shop Name: </label>
            <input type="text" id="name-${shopCount}" placeholder="Enter Shop Name" style="width: 200px; margin-bottom: 10px;">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Product Name</th>
                        <th>Sold</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody>
        `;

        products.forEach((prod, index) => {
            tableHtml += `
                <tr>
                    <td>${prod.code}</td>
                    <td>${prod.name}</td>
                    <td><input type="number" id="sold-${shopCount}-${index}" value="0"></td>
                    <td><input type="number" id="stock-${shopCount}-${index}" value="0"></td>
                </tr>
            `;
        });

        tableHtml += `</tbody></table>`;
        shopDiv.innerHTML = tableHtml;
        container.appendChild(shopDiv);
    }

    function removeShop(id) {
        const shop = document.getElementById(`shop-${id}`);
        shop.remove();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let yPos = 20;

        doc.setFontSize(18);
        doc.text("Dynapharm Sales Report", 105, yPos, { align: "center" });
        yPos += 10;

        for (let i = 1; i <= shopCount; i++) {
            const shopNameInput = document.getElementById(`name-${i}`);
            if (!shopNameInput) continue;

            const shopName = shopNameInput.value || `Shop ${i}`;
            yPos += 10;
            doc.setFontSize(14);
            doc.text(`Shop: ${shopName}`, 14, yPos);
            yPos += 5;

            const tableData = [];
            products.forEach((prod, index) => {
                const sold = document.getElementById(`sold-${i}-${index}`).value;
                const stock = document.getElementById(`stock-${i}-${index}`).value;
                tableData.push([prod.code, prod.name, sold, stock]);
            });

            doc.autoTable({
                startY: yPos,
                head: [['Code', 'Product Name', 'Sold', 'Stock']],
                body: tableData,
            });

            yPos = doc.lastAutoTable.finalY + 10;
        }

        doc.save("Sales_Report.pdf");
    }
</script>

<script src="https://pl28856086.effectivegatecpm.com/4d/d3/ad/4dd3ad32f22e48f7313f97fb2f44aa0c.js"></script>

</body>
</html>
