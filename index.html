<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynapharm Sales System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; }
        .shop-section { border: 2px solid #ff9800; padding: 15px; margin-bottom: 20px; border-radius: 5px; position: relative; }
        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .shop-name-input { width: 60%; font-weight: bold; border: 2px solid #ff9800 !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #ff9800; color: white; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #4caf50; color: white; margin-bottom: 20px; }
        .btn-pdf { background-color: #2196f3; color: white; width: 100%; font-size: 18px; margin-top: 20px; }
        .btn-delete { background-color: #f44336; color: white; font-size: 12px; }
        .total-row { font-weight: bold; background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>DYNAPHARM SALES REPORT</h2>
    
    <button class="btn btn-add" onclick="addShop()">+ Add New Shop</button>
    
    <div id="shops-container"></div>

    <button class="btn btn-pdf" onclick="generatePDF()">Download PDF Report</button>
</div>

<script>
    const products = [
        { id: "1201", name: "Chlorophyll (Small)" },
        { id: "1202", name: "Chlorophyll (Large)" },
        { id: "2205", name: "Ginseng Coffee" },
        { id: "3301", name: "Yee Yang Tablet" }
    ];

    function addShop() {
        const container = document.getElementById('shops-container');
        const shopId = Date.now();
        const shopHtml = `
            <div class="shop-section" id="shop-${shopId}">
                <div class="shop-header">
                    <input type="text" class="shop-name-input" placeholder="Enter Shop Name (e.g. KAPENDA 1)">
                    <button class="btn btn-delete" onclick="removeShop(${shopId})">DELETE SHOP</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Product Name</th>
                            <th>Sold</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map(p => `
                            <tr>
                                <td>${p.id}</td>
                                <td>${p.name}</td>
                                <td><input type="number" class="sold-input" value="0" min="0" onchange="calculateTotals()"></td>
                                <td><input type="number" class="stock-input" value="0" min="0"></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', shopHtml);
    }

    function removeShop(id) {
        document.getElementById(`shop-${id}`).remove();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18);
        doc.setTextColor(211, 47, 47);
        doc.text("DYNAPHARM DAILY SALES REPORT", 14, 20);
        
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 14, 30);

        let yOffset = 40;
        const shops = document.querySelectorAll('.shop-section');

        shops.forEach((shop, index) => {
            const shopName = shop.querySelector('.shop-name-input').value || `Shop ${index + 1}`;
            doc.setFont(undefined, 'bold');
            doc.text(`SHOP: ${shopName.toUpperCase()}`, 14, yOffset);
            
            const rows = [];
            shop.querySelectorAll('tbody tr').forEach(tr => {
                const tds = tr.querySelectorAll('td');
                const sold = tr.querySelector('.sold-input').value;
                const stock = tr.querySelector('.stock-input').value;
                rows.push([tds[0].innerText, tds[1].innerText, sold, stock]);
            });

            doc.autoTable({
                startY: yOffset + 5,
                head: [['Code', 'Product', 'Sold', 'Stock']],
                body: rows,
                theme: 'grid',
                headStyles: { fillGray: [255, 152, 0] }
            });

            yOffset = doc.lastAutoTable.finalY + 15;
        });

        doc.save("Dynapharm_Report.pdf");
    }
</script>

<script src="https://pl28856086.effectivegatecpm.com/4d/d3/ad/4dd3ad32f22e48f7313f97fb2f44aa0c.js"></script>

</body>
</html>
