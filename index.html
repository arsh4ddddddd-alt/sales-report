<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynapharm Sales System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .shop-section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; background: #fafafa; position: relative; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; font-size: 14px; }
        input { width: 100%; box-sizing: border-box; padding: 5px; border: 1px solid #ddd; }
        .remaining-val { font-weight: bold; color: #2c3e50; text-align: center; display: block; }
        .controls { margin-bottom: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .pdf-btn { background-color: #007bff; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dynapharm Sales Report</h1>
    <div class="controls">
        <button onclick="addShop()">Add Shop</button>
        <button class="pdf-btn" onclick="generatePDF()">Download PDF</button>
    </div>
    <div id="shopsContainer"></div>
</div>

<script>
    let shopCount = 0;
    const products = [
        { code: "1201", name: "CHLOROPHYLL 500ML" },
        { code: "1202", name: "CHLOROPHYLL 250ML" },
        { code: "2205", name: "GINSENG COFFEE 2 IN 1" },
        { code: "2217", name: "TONGKAT ALI COFFEE 5 IN 1" },
        { code: "3301", name: "YEE YANG TABLET" },
        { code: "3305", name: "SEA CUCUMBER JELLY" }
    ];

    function addShop() {
        shopCount++;
        const container = document.getElementById('shopsContainer');
        const shopDiv = document.createElement('div');
        shopDiv.className = 'shop-section';
        shopDiv.id = `shop-${shopCount}`;
        
        let tableHtml = `
            <button class="delete-btn" onclick="removeShop(${shopCount})">Delete</button>
            <label>Shop Name: </label>
            <input type="text" id="name-${shopCount}" placeholder="Enter Shop Name" style="width: 200px; margin-bottom: 10px;">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Product Name</th>
                        <th>Opening (Before)</th>
                        <th>Sold</th>
                        <th>Remaining (Stock)</th>
                    </tr>
                </thead>
                <tbody>
        `;

        products.forEach((prod, index) => {
            tableHtml += `
                <tr>
                    <td>${prod.code}</td>
                    <td>${prod.name}</td>
                    <td><input type="number" id="opening-${shopCount}-${index}" value="0" oninput="updateRemaining(${shopCount}, ${index})"></td>
                    <td><input type="number" id="sold-${shopCount}-${index}" value="0" oninput="updateRemaining(${shopCount}, ${index})"></td>
                    <td><span id="remaining-${shopCount}-${index}" class="remaining-val">0</span></td>
                </tr>
            `;
        });

        tableHtml += `</tbody></table>`;
        shopDiv.innerHTML = tableHtml;
        container.appendChild(shopDiv);
    }

    function updateRemaining(shopId, prodIndex) {
        const opening = parseFloat(document.getElementById(`opening-${shopId}-${prodIndex}`).value) || 0;
        const sold = parseFloat(document.getElementById(`sold-${shopId}-${prodIndex}`).value) || 0;
        const remaining = opening - sold;
        const remainingDisplay = document.getElementById(`remaining-${shopId}-${prodIndex}`);
        
        remainingDisplay.innerText = remaining;
        remainingDisplay.style.color = remaining < 0 ? "red" : "#2c3e50"; // Red if error
    }

    function removeShop(id) {
        document.getElementById(`shop-${id}`).remove();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let yPos = 20;

        doc.setFontSize(18);
        doc.text("Dynapharm Sales Report", 105, yPos, { align: "center" });
        yPos += 15;

        const shops = document.querySelectorAll('.shop-section');
        shops.forEach((shop) => {
            const id = shop.id.split('-')[1];
            const shopName = document.getElementById(`name-${id}`).value || `Shop ${id}`;
            
            doc.setFontSize(14);
            doc.text(`Shop: ${shopName}`, 14, yPos);
            
            const tableData = [];
            products.forEach((prod, index) => {
                const opening = document.getElementById(`opening-${id}-${index}`).value;
                const sold = document.getElementById(`sold-${id}-${index}`).value;
                const remaining = document.getElementById(`remaining-${id}-${index}`).innerText;
                tableData.push([prod.code, prod.name, opening, sold, remaining]);
            });

            doc.autoTable({
                startY: yPos + 2,
                head: [['Code', 'Product', 'Opening', 'Sold', 'Remaining']],
                body: tableData,
                theme: 'grid'
            });

            yPos = doc.lastAutoTable.finalY + 15;
        });

        doc.save("Sales_Report_Inventory.pdf");
    }
</script>

<script src="https://pl28856326.effectivegatecpm.com/fb/36/70/fb36709dbb4c4f714498d82eabbdfddf.js"></script>

</body>
</html>
